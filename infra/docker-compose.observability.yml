# ============================================================
# THLuxury — Observability stack (Prometheus + Grafana + Loki + Promtail)
# Tách file để bật/tắt được:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# ============================================================

name: thluxury

networks:
  thluxury-net:
    external: true
    name: thluxury_thluxury-net

volumes:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ---------------------------------------------------------------
  # Prometheus — scrape /actuator/prometheus của các Spring Boot service
  # ---------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: thluxury-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [thluxury-net]

  # ---------------------------------------------------------------
  # Loki — log aggregation (thay ELK cho nhẹ)
  # ---------------------------------------------------------------
  loki:
    image: grafana/loki:3.2.0
    container_name: thluxury-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "-O", "-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [thluxury-net]

  # ---------------------------------------------------------------
  # Promtail — tail Docker container logs → Loki
  # ---------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.0
    container_name: thluxury-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy
    networks: [thluxury-net]

  # ---------------------------------------------------------------
  # Grafana — dashboards (Prometheus + Loki preconfigured)
  # ---------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: thluxury-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks: [thluxury-net]
